<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAW Brain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08080c;
      color: #eaeaf0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
      -webkit-user-select: none;
    }

    .logo {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #e8a230;
      margin-bottom: 32px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(232, 162, 48, 0.15);
      border-top-color: #e8a230;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 12px;
      color: #4e4e64;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="logo">DAW BRAIN</div>
  <div class="spinner"></div>
  <div class="status">Starting server...</div>
</body>
</html>
